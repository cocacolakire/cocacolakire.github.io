<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cocacolakire</title>
    <link href="https://fonts.googleapis.com/css?family=Space+Mono" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <script src="./script/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script
      src="https://kit.fontawesome.com/02c4c0423a.js"
      crossorigin="anonymous"
      async
    ></script>
  </head>
  <body>
    <header class="fixed top-0 w-full z-[2] bg-[rgba(29,29,27,0.9)] text-[#F2F4F3] py-2">
      <h1 class="px-4 text-3xl text-white font-['Space_Mono']">Cocacolakire</h1>
    </header>

    <main class="pt-16">
      <div id="aboutMe" class="p-4 w-[90%] sm:w-[70%] lg:w-1/2 mx-auto flex flex-col items-center gap-4">
        <section class="w-40 h-40 flex-shrink-0 overflow-hidden rounded-full border-[0.8rem] border-[rgb(29,29,27)]">
          <img
            id="profPic"
            src="./resources/images/profile.jpg"
            alt="Picture of me"
            class="h-full w-full object-cover"
          />
        </section>
        <aside x-data="terminalData()" class="w-full bg-[rgba(29,29,27,0.95)] rounded font-['Space_Mono'] text-sm overflow-hidden">
          <!-- terminal title bar -->
          <div class="flex items-center gap-2 bg-[rgb(50,50,48)] px-4 py-2">
            <span class="w-3 h-3 rounded-full bg-red-500"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <span class="ml-2 text-xs text-[#888]">bash</span>
          </div>
          <!-- terminal body -->
          <div class="p-4 leading-relaxed">
            <template x-for="(line, i) in lines" :key="i">
              <p class="mb-1">
                <span class="text-[#2596BE]" x-text="line.prompt"></span><span
                  class="text-[#F2F4F3]"
                  x-text="displayed[i] ?? ''"
                ></span><span
                  x-show="cursorLine === i"
                  class="terminal-cursor"
                >█</span>
              </p>
            </template>
          </div>
        </aside>
      </div>

      <div id="projects" x-data="carouselData()" class=" bg-[rgb(242,244,243)] mt-12">
        <div class="bg-[rgb(29,29,27)] w-full text-center py-4">
          <h2 class="text-2xl text-[#3BC14A] font-bold">Projects</h2>
        </div>
        <div id="carousel" class="carousel">
          <img :src="imgSrc(0)" alt="" class="h-full w-full object-cover" />
        </div>
        <div class="switch-container flex w-[70%] lg:w-[15%] justify-between mx-auto py-2 px-2 pb-4 items-center">
          <button type="button" @click="prev()" class="triangle-buttons flex items-center justify-center p-2 bg-transparent cursor-pointer">
            <div class="triangle-buttons__triangle triangle-buttons__triangle--l"></div>
          </button>
          <h2 x-text="circuits[index]" class="text-2xl text-[rgb(29,29,27)] font-bold"></h2>
          <button type="button" @click="next()" class="triangle-buttons flex items-center justify-center p-2 bg-transparent cursor-pointer">
            <div class="triangle-buttons__triangle triangle-buttons__triangle--r"></div>
          </button>
        </div>
      </div>

      <div id="skillSection" class=" bg-[rgba(29,29,27,0.9)] w-4/5 sm:w-1/2 mx-auto mt-12 mb-32 py-4 text-center">
        <h2 class="text-2xl text-[#3BC14A] font-bold">Skills</h2>
        <span class="pt-4 flex flex-wrap justify-around">
          <i class="fa fa-brands fa-github text-white text-5xl"></i>
          <i class="fa fa-brands fa-html5 text-white text-5xl"></i>
          <i class="fab fa-brands fa-node text-white text-5xl"></i>
          <i class="fab fa-brands fa-python text-white text-5xl"></i>
          <i class="fab fa-brands fa-js text-white text-5xl"></i>
          <i class="fab fa-brands fa-css3-alt text-white text-5xl"></i>
          <i class="fa fa-solid fa-microchip text-white text-5xl"></i>
        </span>
      </div>
    </main>

    <footer class="fixed bottom-0 w-full flex justify-between items-center bg-[rgba(29,29,27,0.95)]">
      <section class="p-4 text-[#3BC14A]">
        Image by
        <a
          href="https://pixabay.com/users/gam-ol-2829280/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5907811"
          class="text-[#2596BE]"
          >Oleg Gamulinskii</a
        >
        from
        <a
          href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5907811"
          class="text-[#2596BE]"
          >Pixabay</a
        >
      </section>
      <section class="p-4">
        <a href="https://linkedin.com/in/erik-hasslid-4039bb265">
          <i class="fa fa-brands fa-linkedin text-white text-5xl"></i>
        </a>
      </section>
    </footer>
  </body>
</html>
